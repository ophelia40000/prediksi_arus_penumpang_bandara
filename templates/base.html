<!DOCTYPE html>
<html>

<head>
    <title>Sistem Prediksi Arus Penumpang Udara</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 5-4 4-2.5-.5L1 18l5 2 2 5 .5-1.5-.5-2.5 4-4 5 6l1.2-.7c.4-.2.7-.6.6-1.1Z" />
            </svg>
            Sistem Prediksi Penumpang Udara
        </div>
        <div class="subtitle">Forecasting</div>
    </div>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <a href="/" class="menu {% if request.path == '/' %}active{% endif %}">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </div>
            </a>

            <div class="menu-dropdown">
                <div class="menu-toggle" onclick="toggleMenu()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                        Manual
                    </div>
                    <svg id="menu-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s;">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </div>
                
                <div id="manual-menu" class="submenu">
                    <a href="/input" class="menu {% if request.path == '/input' %}active{% endif %}">Input Data</a>
                    <a href="/preprocessing" class="menu {% if request.path == '/preprocessing' %}active{% endif %}">Pra-pemrosesan</a>
                    <a href="/method" class="menu {% if request.path == '/method' %}active{% endif %}">Metode</a>
                    <a href="/evaluation" class="menu {% if request.path == '/evaluation' %}active{% endif %}">Evaluasi</a>
                    <a href="/visualization" class="menu {% if request.path == '/visualization' %}active{% endif %}">Visualisasi</a>
                </div>
            </div>

        </div>

        <script>
           
            document.addEventListener('DOMContentLoaded', function() {
                const menu = document.getElementById('manual-menu');
                const arrow = document.getElementById('menu-arrow');
                const currentPath = window.location.pathname;
                const subPages = ['/input', '/preprocessing', '/method', '/evaluation', '/visualization'];
                
                if (subPages.includes(currentPath)) {
                    menu.classList.add('show');
                    arrow.style.transform = 'rotate(180deg)';
                }
            });

            function toggleMenu() {
                const menu = document.getElementById('manual-menu');
                const arrow = document.getElementById('menu-arrow');
                const isShowing = menu.classList.toggle('show');
                arrow.style.transform = isShowing ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        </script>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</body>

</html>
